<!DOCTYPE html>
<html>

<head>
    <title id="tabTitle">Records Manager</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <link href="style.css" rel="stylesheet" type="text/css">

    <!-- Favicon -->
    <link rel="apple-touch-icon" sizes="180x180" href="images/favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="images/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="images/favicon/favicon-16x16.png">
    <link rel="icon" type="image/x-icon" href="images/favicon/favicon.ico">
</head>

<body>
    <div class="topRow">
        <img style="float: left; height: 64px;" src="images/logo.png" />
        <div style="float: right;">
            <button class="themeButton" onclick="changeTheme('light')">☀️</button>
            <button class="themeButton" onclick="changeTheme('dark')">🌙</button>
            <button class="themeButton" onclick="changeTheme('auto')">⚡</button>
        </div>
        <h2 id="tabTitle2" class="tabTitle">Records Manager</h2>
    </div>
    <br style="clear: both;" />

    <div style="background-color: rgb(20, 20, 20, 0.5);">
        <!-- left side -->
        <div class="leftSide">
            search: <br />
            <input id="categoriesSearch" type="search" onkeyup="renderCategoriesList();" style="width: 98%;">
            
            <div class="leftSideList">
                <span id="leftSide"></span>
            </div>
        </div>

        <!-- middle bar -->
        <div style="float: left; width: 1%; background-color: rgb(31, 31, 31); color: rgb(31, 31, 31); min-height: 67vh;">I</div>
        
        <!-- right side -->
        <div class="rightSide">
            <h3 id="sectionTitle">---</h3>
            <span id="editorAreaCategory"></span>
            <br />
            <span id="rightSide"></span>
            <span id="editorAreaRow"></span>
        </div>
        <hr style="clear:both" />
    </div>

    <h3>Settings and tools</h3>
    highlight row: <input id="tableSearch" type="search" onblur="renderRightSide();">
    <br /> <input id="top10" type="checkbox" onchange="renderRightSide();">Only show top 10?
    <br /> <input id="toggleUpsideDown" type="checkbox" onchange="toggleUpsideDown();">Upside Down?
    <br /> <input id="toggleGaps" type="checkbox" onchange="toggleGaps();">Show gaps?

    <div id="editorOnlySettings">
        <h3>(Editor mode only)</h3>
        <button onclick="exportSaveData()">Export data</button>
        <button onclick="importSaveData()">Import data</button>
        <br />
        <button onclick="convertToWikitext()">Convert to Wikitext</button>
    </div>

    <div id="banListsArea">
        <h3>Ban lists</h3>
        <span id="banListsButtons"></span><br />
        <span id="banListContent"></span>
    </div>

    <br /> <br />
    <hr />
    <div style="float: right; text-align: right;">
        <span id="tabTitle3"></span> using <br />
        Records Manager v1.2 <br />
        Made by Schrottii/Balnoom &copy; 2025-2026 <br />
        <a href="https://schrottii.github.io/">link to my other projects</a>
        <br />

        <script type='text/javascript' src='https://storage.ko-fi.com/cdn/widget/Widget_2.js'></script>
        <script type='text/javascript'>kofiwidget2.init('Support me on Ko-fi', '#f57373', 'Y8Y2XMZX1'); kofiwidget2.draw();</script>
    </div>

    <script src="code/libs/wikitext-html-converter.js"></script>
    <script src="wikidata.js"></script>
    <script src="code/config.js"></script>
    <script src="code/recordpoints.js"></script>
    <script src="code/banlists.js"></script>

    <script src="code/save.js"></script>
    <script src="code/main.js"></script>
</body>

</html>
